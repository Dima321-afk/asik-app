<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root {
            --primary: #00a884; --bg-dark: #0b141a; --bg-sidebar: #111b21;
            --text-main: #e9edef; --text-muted: #8696a0; --my-msg: #005c4b;
            --their-msg: #202c33; --danger: #ff4b4b;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        /* Экран входа */
        #auth-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-sidebar); padding: 30px; border-radius: 20px; width: 280px; text-align: center; border: 1px solid #2a3942; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        /* Основной интерфейс */
        .app-container { display: flex; width: 100vw; height: 100vh; }
        .sidebar { width: 100%; max-width: 400px; background: var(--bg-sidebar); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        #contact-list { flex-grow: 1; overflow-y: auto; }
        .contact-item { padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .contact-item:hover { background: rgba(255,255,255,0.05); }

        .chat-view { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-dark); position: relative; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; color: white; }
        .msg-bubble.me { align-self: flex-end; background: var(--my-msg); }
        .msg-bubble.them { align-self: flex-start; background: var(--their-msg); }

        .input-area { padding: 10px; background: var(--bg-sidebar); display: flex; gap: 10px; }
        #msgInput { flex-grow: 1; padding: 10px; border-radius: 20px; border: none; background: #2a3942; color: white; outline: none; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2a3942; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--primary)">ASIK ∞</h1>
        <input type="text" id="auth-uin" class="auth-input" placeholder="Ваш UIN">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
        <button class="auth-btn" onclick="handleAuth()">ВОЙТИ / СОЗДАТЬ</button>
        <div id="auth-error" style="color:var(--danger); font-size:12px; margin-top:10px;"></div>
    </div>
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="header">
            <div class="avatar" id="my-avatar">?</div>
            <h3 style="color:var(--primary); margin:0;">Чат</h3>
            <button onclick="addFriend()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">+</button>
        </div>
        <div id="contact-list"></div>
        <button onclick="logout()" style="padding:15px; color:var(--danger); background:none; border:none; cursor:pointer;">Выйти</button>
    </div>

    <div class="chat-view">
        <div id="chat-header" style="padding:15px; background:var(--bg-sidebar); font-weight:bold;">Выберите чат</div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Введите сообщение...">
            <button onclick="sendMessage()" style="background:none; border:none; color:var(--primary); font-size:20px; cursor:pointer;">➤</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const proxyUrl = "https://dry-unit-8e71.dimitriykor321.workers.dev/";
    firebase.initializeApp({ databaseURL: proxyUrl });
    const db = firebase.database();

    let myUin = localStorage.getItem('asik_uin');
    let currentChat = null;

    if(myUin) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('my-avatar').innerText = myUin[0];
        loadContacts();
    }

    async function handleAuth() {
        const uin = document.getElementById('auth-uin').value.trim();
        const passRaw = document.getElementById('auth-pass').value.trim();
        const err = document.getElementById('auth-error');

        if(!uin || passRaw.length < 4) { err.innerText = "Ошибка в данных!"; return; }
        
        const pass = btoa(passRaw);
        err.style.color = "var(--primary)";
        err.innerText = "Связь с базой...";

        try {
            // Используем fetch напрямую через прокси для надежности авторизации
            const res = await fetch(`${proxyUrl}users_auth/${uin}.json`);
            const data = await res.json();

            if(data) {
                if(data.pass === pass) { login(uin); } 
                else { err.style.color = "var(--danger)"; err.innerText = "Неверный пароль!"; }
            } else {
                if(confirm("Создать UIN " + uin + "?")) {
                    await db.ref('users_auth/' + uin).set({ pass });
                    login(uin);
                }
            }
        } catch(e) { err.innerText = "Ошибка моста. Проверь Cloudflare!"; }
    }

    function login(uin) { localStorage.setItem('asik_uin', uin); location.reload(); }
    function logout() { localStorage.clear(); location.reload(); }

    function loadContacts() {
        db.ref(`user_contacts/${myUin}`).on('value', snap => {
            const list = document.getElementById('contact-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.innerHTML = `<div class="avatar">${child.val()[0]}</div><b>${child.val()}</b>`;
                div.onclick = () => openChat(child.key, child.val());
                list.appendChild(div);
            });
        });
    }

    function openChat(targetUin, name) {
        currentChat = targetUin;
        document.getElementById('chat-header').innerText = "Чат с: " + name;
        const chatId = [myUin, targetUin].sort().join("_");
        
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("value", snap => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                div.className = `msg-bubble ${m.from == myUin ? 'me' : 'them'}`;
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim() || !currentChat) return;
        const chatId = [myUin, currentChat].sort().join("_");
        db.ref("private_chats/" + chatId).push().set({
            from: myUin, text: input.value.trim(), time: Date.now()
        });
        input.value = "";
    }

    function addFriend() {
        const uin = prompt("UIN друга:");
        const name = prompt("Имя:");
        if(uin && name) db.ref(`user_contacts/${myUin}/${uin}`).set(name);
    }

    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>

</body>
</html>
