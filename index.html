<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK Messenger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/100/communication.png">
    
    <style>
        :root {
            --bg-main: #1e1e1e;
            --bg-window: #2d2d2d;
            --accent: #00b894;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --border: #3f3f3f;
        }

        body { 
            background-color: var(--bg-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: var(--text-main);
        }

        .app-container { 
            width: 100%; max-width: 400px; height: 100vh; 
            background: var(--bg-window); display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* Шапка */
        .header { 
            padding: 20px; background: #252525; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; color: var(--accent); }

        /* Список контактов */
        #contact-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .contact-card { 
            background: #353535; margin-bottom: 10px; padding: 15px; 
            border-radius: 12px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
            border: 1px solid transparent;
        }
        .contact-card:active { transform: scale(0.98); background: #404040; border-color: var(--accent); }
        
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #555; }
        .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        /* Окно чата */
        #chat-window { display: none; flex-direction: column; height: 100%; background: var(--bg-main); }
        .chat-header { padding: 15px; background: #252525; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }
        
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .bubble { 
            max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4;
            word-wrap: break-word; position: relative;
        }
        .bubble.me { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble.them { background: #353535; color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Поле ввода */
        .input-area { 
            padding: 15px; background: #252525; border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        input[type="text"] { 
            flex-grow: 1; background: #1e1e1e; border: 1px solid var(--border); 
            padding: 12px; border-radius: 25px; color: white; outline: none;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        .btn-round { 
            width: 45px; height: 45px; border-radius: 50%; border: none; 
            background: var(--accent); color: #000; font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }

        .btn-attach { background: #444; color: white; font-size: 1.2rem; }

        /* Инфо панель */
        .user-info { font-size: 0.8rem; color: var(--text-dim); padding: 5px 20px; background: #1a1a1a; }
    </style>
</head>
<body>

<div class="app-container" id="main-window">
    <div class="header">
        <h1>ASIK NEO</h1>
        <button class="btn-round" onclick="addContact()" style="width: auto; padding: 0 15px; border-radius: 10px;">+</button>
    </div>
    <div class="user-info">Ваш UIN: <span id="my-uin-display" style="color:var(--accent)">...</span></div>
    <div id="contact-list"></div>
</div>

<div class="app-container" id="chat-window">
    <div class="chat-header">
        <button onclick="showContacts()" style="background:none; border:none; color:var(--accent); font-size:1.5rem; cursor:pointer;"><</button>
        <div id="target-label" style="font-weight:bold;">Чат</div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <button class="btn-round btn-attach" onclick="sendAttachment()">+</button>
        <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
        <button class="btn-round" onclick="sendMessage()">></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://asik-app-32e5b-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    let myUin = localStorage.getItem('asik_saved_uin');
    let currentTarget = null;
    let contactData = JSON.parse(localStorage.getItem('asik_contact_data') || '{}');

    function checkLogin() {
        if (!myUin) {
            let u = prompt("Ваш UIN:");
            if (u && u.trim()) {
                myUin = u.trim();
                localStorage.setItem('asik_saved_uin', myUin);
            } else { location.reload(); }
        }
        document.getElementById('my-uin-display').innerText = myUin;
        db.ref('status/' + myUin).set(true);
        db.ref('status/' + myUin).onDisconnect().remove();
        renderContacts();
        startGlobalListener();
    }

    function renderContacts() {
        const list = document.getElementById('contact-list');
        list.innerHTML = "";
        Object.keys(contactData).forEach(uin => {
            const card = document.createElement('div');
            card.className = 'contact-card';
            card.innerHTML = `
                <div class="status-dot" id="dot-${uin}"></div>
                <div style="flex-grow:1">
                    <div style="font-weight:bold">${contactData[uin]}</div>
                    <div style="font-size:0.8rem; color:var(--text-dim)">UIN: ${uin}</div>
                </div>
            `;
            card.onclick = () => openChat(uin, contactData[uin]);
            list.appendChild(card);
        });
    }

    function startGlobalListener() {
        Object.keys(contactData).forEach(uin => {
            db.ref('status/' + uin).on('value', snap => {
                const dot = document.getElementById('dot-' + uin);
                if (dot) dot.classList.toggle('online', !!snap.val());
            });

            const chatId = [myUin, uin].sort().join("_");
            db.ref("private_chats/" + chatId).limitToLast(1).on("child_added", snap => {
                const data = snap.val();
                if (data.from !== myUin && currentTarget !== uin) {
                    new Notification(`ASIK: ${contactData[uin]}`, { body: data.text });
                    alertSound.play().catch(()=>{});
                    document.title = "(1) ASIK Messenger";
                }
            });
        });
    }

    function openChat(uin, name) {
        currentTarget = uin;
        document.title = "ASIK Messenger";
        document.getElementById('main-window').style.display = 'none';
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('target-label').innerText = name;
        
        const msgBox = document.getElementById('messages');
        const chatId = [myUin, uin].sort().join("_");
        
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("value", snap => {
            msgBox.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                const isMe = data.from == myUin;
                const div = document.createElement('div');
                div.className = `bubble ${isMe ? 'me' : 'them'}`;
                div.innerText = data.text;
                msgBox.appendChild(div);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if (input.value.trim() && currentTarget) {
            const chatId = [myUin, currentTarget].sort().join("_");
            db.ref("private_chats/" + chatId).push().set({ from: myUin, text: input.value.trim() });
            input.value = "";
        }
    }

    function sendAttachment() {
        const url = prompt("Вставьте ссылку на фото или файл:");
        if (url) {
            const input = document.getElementById('msgInput');
            input.value = url;
            sendMessage();
        }
    }

    function addContact() {
        const uin = prompt("UIN друга:");
        const name = prompt("Имя:");
        if (uin && name) {
            contactData[uin.trim()] = name;
            localStorage.setItem('asik_contact_data', JSON.stringify(contactData));
            location.reload();
        }
    }

    function showContacts() {
        currentTarget = null;
        document.getElementById('main-window').style.display = 'flex';
        document.getElementById('chat-window').style.display = 'none';
    }

    document.getElementById('msgInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    if (Notification.permission !== "granted") Notification.requestPermission();
    checkLogin();
</script>
</body>
</html>
