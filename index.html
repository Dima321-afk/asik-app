<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK - Infinity v3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.07);
            --text: #e0e0e0;
        }

        body { 
            background: var(--bg); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: var(--text);
            overflow: hidden;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.3; }

        .app-shell { 
            width: 100%; max-width: 420px; height: 100vh; 
            background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(25px);
            display: flex; flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .header { 
            padding: 25px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { margin: 0; font-size: 1.5rem; font-weight: 200; letter-spacing: 4px; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        #contact-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .contact-card { 
            background: var(--glass); margin-bottom: 10px; padding: 16px; 
            border-radius: 20px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: 0.3s; border: 1px solid transparent;
        }
        .contact-card:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .contact-card.notes { border: 1px solid var(--accent); background: rgba(0, 242, 255, 0.05); }
        
        .status-orb { width: 10px; height: 10px; border-radius: 50%; background: #333; }
        .status-orb.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        #chat-window { display: none; flex-direction: column; height: 100%; position: absolute; top: 0; width: 100%; background: var(--bg); z-index: 10; }
        .chat-header { padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--glass); }
        
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { 
            max-width: 80%; padding: 12px 16px; border-radius: 22px; font-size: 0.95rem;
            position: relative; transition: 0.2s; user-select: none;
        }
        .msg.me { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.them { background: var(--glass); color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .reaction { position: absolute; bottom: -8px; right: 10px; font-size: 14px; background: #1e1e1e; border-radius: 10px; padding: 2px 5px; border: 1px solid var(--accent); }

        .input-bar { padding: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.2); }
        input[type="text"] { 
            flex-grow: 1; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px 20px; border-radius: 30px; color: white; outline: none;
        }

        .btn { width: 50px; height: 50px; border-radius: 25px; border: none; background: var(--accent); color: #000; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-attach { background: var(--glass); color: white; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="app-shell" id="main-window">
    <div class="header">
        <h1>ASIK<span>∞</span></h1>
        <button class="btn" onclick="addContact()" style="width: 40px; height: 40px;">+</button>
    </div>
    <div id="contact-list"></div>
</div>

<div class="app-shell" id="chat-window">
    <div class="chat-header">
        <button onclick="showContacts()" style="background:none; border:none; color:var(--accent); font-size:1.8rem;">←</button>
        <div id="target-label" style="font-weight:200;">Чат</div>
    </div>
    <div id="messages"></div>
    <div class="input-bar">
        <button class="btn btn-attach" onclick="sendMedia()">📎</button>
        <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://asik-app-32e5b-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Мягкий звук "Капля"
    const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    let myUin = localStorage.getItem('asik_saved_uin');
    let currentTarget = null;

    // ПРАВКА КОНТАКТОВ: Миграция данных
    let oldContacts = JSON.parse(localStorage.getItem('asik_contacts') || '[]');
    let contactData = JSON.parse(localStorage.getItem('asik_contact_data') || '{}');
    
    // Если есть старые цифры, но нет имен - переносим их
    oldContacts.forEach(uin => { if(!contactData[uin]) contactData[uin] = uin; });
    if(!contactData["000"]) contactData["000"] = "✨ Мои заметки";
    localStorage.setItem('asik_contact_data', JSON.stringify(contactData));

    function checkLogin() {
        if (!myUin) {
            let u = prompt("Твой номер (UIN):");
            if (u && u.trim()) {
                myUin = u.trim();
                localStorage.setItem('asik_saved_uin', myUin);
            } else { location.reload(); }
        }
        db.ref('status/' + myUin).set(true);
        db.ref('status/' + myUin).onDisconnect().remove();
        renderContacts();
        startGlobalListener();
    }

    function renderContacts() {
        const list = document.getElementById('contact-list');
        list.innerHTML = "";
        // Заметки всегда первые
        const sortedUins = Object.keys(contactData).sort((a,b) => (a === '000' ? -1 : 1));
        
        sortedUins.forEach(uin => {
            const card = document.createElement('div');
            card.className = `contact-card ${uin === '000' ? 'notes' : ''}`;
            card.innerHTML = `
                <div class="status-orb ${uin === '000' ? 'online' : ''}" id="orb-${uin}"></div>
                <div>
                    <div style="font-weight:400;">${contactData[uin]}</div>
                    <div style="font-size:0.7rem; opacity:0.4">ID: ${uin}</div>
                </div>
            `;
            card.onclick = () => openChat(uin, contactData[uin]);
            list.appendChild(card);
        });
    }

    function startGlobalListener() {
        Object.keys(contactData).forEach(uin => {
            if(uin === '000') return;
            db.ref('status/' + uin).on('value', snap => {
                const orb = document.getElementById('orb-' + uin);
                if (orb) orb.classList.toggle('online', !!snap.val());
            });

            const chatId = [myUin, uin].sort().join("_");
            db.ref("private_chats/" + chatId).limitToLast(1).on("child_added", snap => {
                const data = snap.val();
                if (data.from !== myUin && currentTarget !== uin) {
                    alertSound.play().catch(()=>{});
                    if (Notification.permission === "granted") new Notification(contactData[uin], { body: data.text });
                }
            });
        });
    }

    function openChat(uin, name) {
        currentTarget = uin;
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('target-label').innerText = name;
        const chatId = uin === '000' ? "notes_" + myUin : [myUin, uin].sort().join("_");
        
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("value", snap => {
            const msgBox = document.getElementById('messages');
            msgBox.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                const isMe = data.from == myUin;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                
                let content = data.text;
                if (content.match(/\.(jpeg|jpg|png)$/)) content = `<img src="${content}" style="max-width:100%; border-radius:10px;">`;
                
                div.innerHTML = `<div>${content}</div>${data.react ? `<span class="reaction">${data.react}</span>` : ''}`;
                
                // РЕАКЦИЯ НА ДВОЙНОЙ КЛИК
                div.ondblclick = () => {
                    if(!isMe) db.ref("private_chats/" + chatId + "/" + child.key).update({ react: '✅' });
                };
                
                msgBox.appendChild(div);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        });
        document.getElementById('msgInput').focus();
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if (input.value.trim() && currentTarget) {
            const chatId = currentTarget === '000' ? "notes_" + myUin : [myUin, currentTarget].sort().join("_");
            db.ref("private_chats/" + chatId).push().set({ from: myUin, text: input.value.trim(), time: Date.now() });
            input.value = "";
        }
    }

    function sendMedia() {
        const url = prompt("Ссылка на фото:");
        if (url) { document.getElementById('msgInput').value = url; sendMessage(); }
    }

    function addContact() {
        const uin = prompt("UIN друга:");
        const name = prompt("Имя:");
        if (uin && name) {
            contactData[uin.trim()] = name;
            localStorage.setItem('asik_contact_data', JSON.stringify(contactData));
            renderContacts();
        }
    }

    function showContacts() { currentTarget = null; document.getElementById('chat-window').style.display = 'none'; }

    // Анимация фона
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let dots = [];
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();
    for(let i=0; i<30; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5});
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#00f2ff';
        dots.forEach(d => {
            d.x += d.vx; d.y += d.vy;
            if(d.x<0 || d.x>canvas.width) d.vx*=-1;
            if(d.y<0 || d.y>canvas.height) d.vy*=-1;
            ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(anim);
    }
    anim();

    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    if (Notification.permission !== "granted") Notification.requestPermission();
    checkLogin();
</script>
</body>
</html>
