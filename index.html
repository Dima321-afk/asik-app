<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK Messenger - Contacts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background-color: #008080; font-family: 'Tahoma', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .window { width: 95%; max-width: 300px; background: #c0c0c0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; display: flex; flex-direction: column; height: 450px; }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 4px 6px; font-weight: bold; display: flex; justify-content: space-between; font-size: 12px; }
        
        /* Список контактов */
        #contact-list { flex-grow: 1; background: white; margin: 5px; border: 2px inset #fff; overflow-y: auto; }
        .contact-item { padding: 5px 10px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        .contact-item:hover { background: #000080; color: white; }
        .flower { width: 16px; height: 16px; }

        /* Окно чата (скрыто по умолчанию) */
        #chat-window { display: none; flex-direction: column; height: 100%; }
        #messages { flex-grow: 1; background: white; margin: 5px; border: 2px inset #fff; overflow-y: auto; padding: 5px; font-size: 13px; }
        
        .controls { padding: 8px; display: flex; flex-direction: column; gap: 5px; }
        input { border: 2px inset #fff; padding: 6px; outline: none; }
        button { background: #c0c0c0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; cursor: pointer; padding: 5px; font-weight: bold; }
        .back-btn { background: #c0c0c0; border: 1px solid #000; font-size: 10px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="window" id="main-window">
    <div class="title-bar">
        <span><img src="https://img.icons8.com/plasticine/24/bicycle.png" style="width:14px;"> ASIK - Список</span>
        <button class="back-btn" onclick="addContact()">+</button>
    </div>
    
    <div style="padding: 5px;"><input type="number" id="myUin" placeholder="Мой UIN (напр. 111)" style="width: 90%;"></div>
    
    <div id="contact-list">
        </div>
</div>

<div class="window" id="chat-window">
    <div class="title-bar">
        <span><button class="back-btn" onclick="showContacts()"> < </button> Чат с <span id="target-label">...</span></span>
    </div>
    <div id="messages"></div>
    <div class="controls">
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">ОТПРАВИТЬ</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://asik-app-32e5b-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentTarget = null;
    let contacts = JSON.parse(localStorage.getItem('asik_contacts') || "[]");

    function renderContacts() {
        const list = document.getElementById('contact-list');
        list.innerHTML = "";
        contacts.forEach(uin => {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.innerHTML = `<img src="https://img.icons8.com/color/16/flower.png" class="flower"> UIN: ${uin}`;
            div.onclick = () => openChat(uin);
            list.appendChild(div);
        });
    }

    function addContact() {
        const uin = prompt("Введите UIN друга:");
        if (uin && !contacts.includes(uin)) {
            contacts.push(uin);
            localStorage.setItem('asik_contacts', JSON.stringify(contacts));
            renderContacts();
        }
    }

    function openChat(uin) {
        const myUin = document.getElementById('myUin').value;
        if (!myUin) { alert("Сначала введи свой UIN!"); return; }
        
        currentTarget = uin;
        document.getElementById('main-window').style.display = 'none';
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('target-label').innerText = uin;
        
        const chatId = [myUin, uin].sort().join("_");
        const msgBox = document.getElementById('messages');
        msgBox.innerHTML = "";
        
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("child_added", (snap) => {
            const data = snap.val();
            msgBox.innerHTML += `<div><b>${data.from}:</b> ${data.text}</div>`;
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    }

    function sendMessage() {
        const myUin = document.getElementById('myUin').value;
        const text = document.getElementById('msgInput').value;
        if (text.trim() && currentTarget) {
            const chatId = [myUin, currentTarget].sort().join("_");
            db.ref("private_chats/" + chatId).push().set({ from: myUin, text: text });
            document.getElementById('msgInput').value = "";
        }
    }

    function showContacts() {
        document.getElementById('main-window').style.display = 'flex';
        document.getElementById('chat-window').style.display = 'none';
    }

    renderContacts();
</script>
</body>
</html>
