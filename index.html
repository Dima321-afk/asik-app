<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <style>
        :root {
            --primary: #00a884;
            --bg-dark: #0b141a;
            --bg-sidebar: #111b21;
            --text-main: #e9edef;
            --text-muted: #8696a0;
            --my-msg: #005c4b;
            --their-msg: #202c33;
            --accent: #00f2ff;
            --danger: #ff4b4b;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        #auth-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-sidebar); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; width: 280px; text-align: center; }
        .auth-input { padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; outline: none; }
        .auth-btn { padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        .app-container { display: flex; width: 100vw; height: 100vh; }

        .sidebar { width: 100%; max-width: 400px; height: 100%; background: var(--bg-sidebar); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; z-index: 5; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-sidebar); }
        
        .contact-item { padding: 12px 16px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); transition: 0.2s; }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #2a3942; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; border: 2px solid var(--primary); color: white; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .chat-view { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-dark); position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .chat-view.active { transform: translateX(0); }

        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--bg-dark); }
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); color: white; }
        .msg-bubble.me { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 2px; }
        .msg-bubble.them { align-self: flex-start; background: var(--their-msg); border-bottom-left-radius: 2px; }

        .input-area { padding: 10px 15px; background: var(--bg-sidebar); display: flex; align-items: center; gap: 8px; }
        #msgInput { flex-grow: 1; border: none; padding: 12px 18px; border-radius: 25px; background: #2a3942; color: #fff; outline: none; }

        .btn-action { width: 40px; height: 40px; border-radius: 50%; border: none; background: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .btn-record.recording { color: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #msgMenu { position: fixed; background: #222; border: 1px solid #444; border-radius: 12px; display: none; z-index: 1000; padding: 5px; }
        #msgMenu button { display: block; width: 100%; border: none; background: none; color: white; padding: 10px 15px; text-align: left; cursor: pointer; border-radius: 8px; }

        audio { height: 35px; width: 200px; filter: invert(1); margin-top: 5px; }

        @media (min-width: 768px) { .chat-view { position: relative; transform: translateX(0); } .sidebar { width: 380px; } .back-btn { display: none; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--primary); margin:0;">ASIK ∞</h1>
        <input type="text" id="auth-uin" class="auth-input" placeholder="Ваш UIN">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
        <button class="auth-btn" onclick="handleAuth()">ВОЙТИ / СОЗДАТЬ</button>
        <div id="auth-error" style="color:var(--danger); font-size:0.7rem; height:10px;"></div>
    </div>
</div>

<div id="msgMenu">
    <button onclick="deleteMsg()">🗑 Удалить сообщение</button>
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="header">
            <div class="avatar" id="my-avatar" onclick="updateAvatar()">?</div>
            <h3 style="color:var(--primary)">ASIK</h3>
            <button class="btn-action" onclick="addFriend()">👤+</button>
        </div>
        <div id="contact-list"></div>
        <button onclick="logout()" style="margin-top:auto; background:none; border:none; color:var(--danger); padding:20px; cursor:pointer;">Выйти</button>
    </div>

    <div class="chat-view" id="chat-window">
        <div class="chat-header" style="padding:10px 16px; background:var(--bg-sidebar); display:flex; align-items:center; gap:12px;">
            <button class="btn-action back-btn" onclick="closeChat()">←</button>
            <div class="avatar" id="chat-avatar">?</div>
            <div id="chat-title" style="font-weight:600">Выберите чат</div>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="file" id="fileInput" hidden accept="image/*">
            <button class="btn-action" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
            <button class="btn-action btn-record" id="recordBtn" onclick="toggleVoice()">🎙️</button>
            <button class="btn-action" onclick="sendMessage()" style="color:var(--primary)">➤</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Твой персональный мост через Cloudflare Workers
    const proxyUrl = "https://dry-unit-8e71.dimitriykor321.workers.dev"; 

    const firebaseConfig = { 
        databaseURL: proxyUrl 
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Оптимизация под глушилки и офлайн режим
    db.ref().keepSynced(true);
    db.goOnline();

    let myUin = localStorage.getItem('asik_uin');
    let currentTarget = null;
    let selectedMsgId = null;
    let mediaRecorder, audioChunks = [];

    if(myUin) {
        document.getElementById('auth-screen').style.display = 'none';
        startApp();
    }

    async function handleAuth() {
        const uin = document.getElementById('auth-uin').value.trim();
        const pass = btoa(document.getElementById('auth-pass').value.trim());
        const err = document.getElementById('auth-error');
        if(!uin || pass.length < 4) return err.innerText = "UIN и пароль (4+) обязательны!";

        const snap = await db.ref('users_auth/' + uin).once('value');
        if(snap.exists()) {
            if(snap.val().pass === pass) login(uin);
            else err.innerText = "Неверный пароль!";
        } else {
            if(confirm("Создать новый аккаунт?")) {
                await db.ref('users_auth/' + uin).set({ pass });
                login(uin);
            }
        }
    }

    function login(uin) {
        localStorage.setItem('asik_uin', uin);
        location.reload();
    }

    function logout() { localStorage.clear(); location.reload(); }

    function startApp() {
        db.ref(`profiles/${myUin}/avatar`).on('value', snap => {
            if(snap.val()) document.getElementById('my-avatar').innerHTML = `<img src="${snap.val()}">`;
        });
        loadFriends();
    }

    function loadFriends() {
        db.ref(`user_contacts/${myUin}`).on('value', snap => {
            const list = document.getElementById('contact-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const uin = child.key; const name = child.val();
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.innerHTML = `<div class="avatar">${name[0]}</div><b>${name}</b>`;
                div.onclick = () => openChat(uin, name);
                list.appendChild(div);
            });
        });
    }

    function openChat(uin, name) {
        currentTarget = uin;
        document.getElementById('chat-window').classList.add('active');
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-avatar').innerText = name[0];
        
        const chatId = [myUin, uin].sort().join("_");
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("value", snap => {
            const msgBox = document.getElementById('messages');
            msgBox.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                const div = document.createElement('div');
                div.className = `msg-bubble ${data.from == myUin ? 'me' : 'them'}`;
                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    selectedMsgId = { chatId, msgId: child.key };
                    const menu = document.getElementById('msgMenu');
                    menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                };
                
                let html = `<div>${data.text || ''}</div>`;
                if(data.image) html += `<img src="${data.image}" style="max-width:100%; border-radius:8px; margin-top:5px;">`;
                if(data.voice) html += `<audio controls src="${data.voice}"></audio>`;
                div.innerHTML = html;
                msgBox.appendChild(div);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    }

    function sendMessage(extras = {}) {
        const input = document.getElementById('msgInput');
        if((input.value.trim() || extras.image || extras.voice) && currentTarget) {
            const chatId = [myUin, currentTarget].sort().join("_");
            db.ref("private_chats/" + chatId).push().set({
                from: myUin, text: input.value.trim(), time: Date.now(), ...extras
            });
            input.value = "";
        }
    }

    async function toggleVoice() {
        const btn = document.getElementById('recordBtn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' }));
                reader.onloadend = () => sendMessage({ voice: reader.result });
            };
            mediaRecorder.start(); btn.classList.add('recording');
        } else { mediaRecorder.stop(); btn.classList.remove('recording'); }
    }

    function deleteMsg() {
        if(selectedMsgId) db.ref(`private_chats/${selectedMsgId.chatId}/${selectedMsgId.msgId}`).remove();
        document.getElementById('msgMenu').style.display = 'none';
    }

    function addFriend() {
        const uin = prompt("UIN друга:"); const name = prompt("Имя:");
        if(uin && name) db.ref(`user_contacts/${myUin}/${uin}`).set(name);
    }

    function updateAvatar() {
        const url = prompt("Ссылка на фото для авы:");
        if(url) db.ref(`profiles/${myUin}`).set({ avatar: url });
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('active'); }
    window.onclick = () => document.getElementById('msgMenu').style.display = 'none';
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.readAsDataURL(e.target.files[0]);
        reader.onload = () => sendMessage({ image: reader.result });
    };
</script>
</body>
</html>
