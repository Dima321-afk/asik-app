<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK Messenger</title>
    <style>
        /* Здесь наш олдскульный стиль: зеленый цветочек, синие заголовки */
        body { background: #ECE9D8; font-family: Tahoma, sans-serif; font-size: 12px; }
        #chat-box { width: 300px; height: 400px; border: 2px inset #fff; background: white; overflow-y: scroll; margin-bottom: 10px; padding: 5px; }
        .msg { margin-bottom: 5px; border-bottom: 1px dotted #ccc; }
        .nickname { color: blue; font-weight: bold; }
        input { border: 1px solid #7B9ebd; padding: 3px; }
    </style>
</head>
<body>

    <h3><img src="https://img.icons8.com/color/24/000000/flower.png"> ASIK Messenger</h3>
    
    <div id="chat-box"></div>

    <input type="text" id="user" placeholder="Твой ник" style="width: 60px;">
    <input type="text" id="message" placeholder="Сообщение..." style="width: 160px;">
    <button onclick="sendMessage()">Отпр.</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ТВОИ НАСТРОЙКИ (Вставь свою ссылку ниже)
        const firebaseConfig = {
            databaseURL: "ВСТАВЬ_ССЫЛКУ_ИЗ_ШАГА_1_ЗДЕСЬ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Функция отправки
        function sendMessage() {
            const user = document.getElementById('user').value || "Аноним";
            const text = document.getElementById('message').value;
            if (text) {
                db.ref("messages").push().set({
                    username: user,
                    text: text,
                    timestamp: Date.now()
                });
                document.getElementById('message').value = "";
            }
        }

        // Слушаем новые сообщения
        db.ref("messages").on("child_added", (snapshot) => {
            const data = snapshot.val();
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg"><span class="nickname">${data.username}:</span> ${data.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
