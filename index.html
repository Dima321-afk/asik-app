<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --p: #00a884; --bg: #0b141a; --s: #111b21; --border: #2a3942; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; position: fixed; inset: 0; background: var(--bg); z-index: 1000; }
        .card { background: var(--s); padding: 30px; border-radius: 20px; width: 80%; max-width: 300px; text-align: center; border: 1px solid var(--border); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--p); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }

        #app { display: none; height: 100vh; width: 100vw; position: relative; }
        
        /* Список контактов */
        .sidebar { width: 100%; height: 100%; background: var(--s); display: flex; flex-direction: column; position: absolute; transition: 0.3s; z-index: 10; }
        .sidebar.hidden { transform: translateX(-100%); }
        
        /* Окно чата */
        .chat { width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; position: absolute; transform: translateX(100%); transition: 0.3s; z-index: 20; }
        .chat.active { transform: translateX(0); }

        .header { padding: 15px; background: #182229; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        #msgs { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0d1418; }
        .m { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .me { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 2px; }
        .them { align-self: flex-start; background: #202c33; border-bottom-left-radius: 2px; }

        .item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .item:active { background: #2a3942; }
        
        .input-area { padding: 10px; background: var(--s); display: flex; gap: 10px; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        #msg { flex-grow: 1; margin: 0; border-radius: 20px; background: #2a3942; border: none; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--p); border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @media (min-width: 800px) {
            .sidebar { width: 350px; position: static; transform: none !important; }
            .chat { width: auto; flex-grow: 1; position: static; transform: none !important; }
            .back-btn { display: none; }
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card">
        <h1 style="color:var(--p); margin-top:0;">ASIK ∞</h1>
        <input type="text" id="u" placeholder="Ваш UIN">
        <input type="password" id="p" placeholder="Пароль">
        <button class="btn" onclick="auth()">ВОЙТИ</button>
    </div>
</div>

<div id="app">
    <div class="sidebar" id="side">
        <div class="header">
            <b id="myU" style="font-size:18px;">ASIK</b>
            <button onclick="add()" style="background:none; border:none; color:var(--p); font-size:30px; cursor:pointer;">+</button>
        </div>
        <div id="list" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="padding:10px; text-align:center;">
             <button onclick="localStorage.clear(); location.reload();" style="color:gray; border:none; background:none; font-size:12px;">Выйти</button>
        </div>
    </div>

    <div class="chat" id="chat">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="back-btn" onclick="back()" style="background:none; border:none; color:var(--p); font-size:24px; cursor:pointer;">←</button>
                <b id="h">Выберите чат</b>
            </div>
        </div>
        <div id="msgs"></div>
        <div class="input-area">
            <input type="text" id="msg" placeholder="Сообщение..." autocomplete="off">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
    const url = "https://dry-unit-8e71.dimitriykor321.workers.dev/";
    let my = localStorage.getItem('asik_uin');
    let active = null;

    if(my) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('myU').innerText = "Я: " + my;
        load();
        setInterval(refresh, 2500); 
    }

    async function auth() {
        const uin = document.getElementById('u').value.trim();
        const pass = btoa(document.getElementById('p').value.trim());
        if(!uin) return;
        try {
            const r = await fetch(`${url}users_auth/${uin}.json`);
            const d = await r.json();
            if(d && d.pass === pass) { go(uin); }
            else if(!d) {
                await fetch(`${url}users_auth/${uin}.json`, { method: 'PUT', body: JSON.stringify({pass}) });
                go(uin);
            } else { alert("Неверный пароль!"); }
        } catch(e) { alert("Ошибка сети!"); }
    }

    function go(uin) { localStorage.setItem('asik_uin', uin); location.reload(); }

    async function load() {
        try {
            const r = await fetch(`${url}user_contacts/${my}.json`);
            const d = await r.json();
            const l = document.getElementById('list');
            l.innerHTML = "";
            if(d) Object.keys(d).forEach(k => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<div style="width:40px;height:40px;background:#3d4a52;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;">${d[k][0].toUpperCase()}</div><b>${d[k]}</b>`;
                div.onclick = () => { 
                    active = k; 
                    document.getElementById('h').innerText = d[k]; 
                    document.getElementById('chat').classList.add('active');
                    refresh(); 
                };
                l.appendChild(div);
            });
        } catch(e) {}
    }

    async function add() {
        const uin = prompt("UIN друга:");
        const name = prompt("Имя:");
        if(uin && name) {
            await fetch(`${url}user_contacts/${my}/${uin}.json`, { method: 'PUT', body: JSON.stringify(name) });
            load();
        }
    }

    function back() { document.getElementById('chat').classList.remove('active'); active = null; }

    async function send() {
        const i = document.getElementById('msg');
        if(!i.value.trim() || !active) return;
        const id = [my, active].sort().join("_");
        const text = i.value.trim();
        i.value = "";
        
        // Сразу добавляем в окно для скорости
        const b = document.getElementById('msgs');
        const div = document.createElement('div');
        div.className = "m me"; div.innerText = text;
        b.appendChild(div);
        b.scrollTop = b.scrollHeight;

        await fetch(`${url}private_chats/${id}.json`, { 
            method: 'POST', 
            body: JSON.stringify({ from: my, text: text }) 
        });
        refresh();
    }

    async function refresh() {
        if(!active) return;
        const id = [my, active].sort().join("_");
        try {
            const r = await fetch(`${url}private_chats/${id}.json`);
            const d = await r.json();
            const b = document.getElementById('msgs');
            b.innerHTML = "";
            if(d) Object.values(d).forEach(m => {
                const div = document.createElement('div');
                div.className = "m " + (m.from == my ? "me" : "them");
                div.innerText = m.text;
                b.appendChild(div);
            });
            b.scrollTop = b.scrollHeight;
        } catch(e) {}
    }
</script>
</body>
</html>
