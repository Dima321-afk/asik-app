<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK Messenger</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://img.icons8.com/plasticine/100/bicycle.png">
    
    <style>
        body { background-color: #008080; font-family: 'Tahoma', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .window { width: 95%; max-width: 300px; background: #c0c0c0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; display: flex; flex-direction: column; height: 520px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 4px 8px; font-weight: bold; display: flex; justify-content: space-between; font-size: 13px; align-items: center; }
        
        .status-bar { padding: 5px 10px; background: #d0d0d0; border-bottom: 1px solid #808080; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        
        #contact-list { flex-grow: 1; background: white; margin: 5px; border: 2px inset #fff; overflow-y: auto; }
        .contact-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; color: black; font-size: 14px; }
        .contact-item:active { background: #000080; color: white; }
        .flower { width: 18px; height: 18px; }

        #chat-window { display: none; flex-direction: column; height: 100%; }
        #messages { flex-grow: 1; background: white; margin: 5px; border: 2px inset #fff; overflow-y: auto; padding: 10px; font-size: 13px; color: black; line-height: 1.4; }
        
        .controls { padding: 10px; display: flex; flex-direction: column; gap: 5px; background: #c0c0c0; }
        input { border: 2px inset #fff; padding: 10px; outline: none; font-size: 16px; background: white; }
        button { background: #c0c0c0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; cursor: pointer; padding: 8px; font-weight: bold; font-family: 'Tahoma'; }
        button:active { border: 2px inset #fff; }
        .back-btn { padding: 2px 8px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="window" id="main-window">
    <div class="title-bar">
        <span><img src="https://img.icons8.com/plasticine/24/bicycle.png" style="width:16px; vertical-align: middle;"> ASIK Messenger</span>
        <button onclick="addContact()" style="font-size:10px;">ДОБАВИТЬ</button>
    </div>
    <div class="status-bar">
        <span>Мой UIN: <b id="my-uin-display">...</b></span>
        <button onclick="logout()" style="font-size:9px;">Выход</button>
    </div>
    <div id="contact-list"></div>
</div>

<div class="window" id="chat-window">
    <div class="title-bar">
        <span><button class="back-btn" onclick="showContacts()"><</button> Чат: <span id="target-label">...</span></span>
    </div>
    <div id="messages"></div>
    <div class="controls">
        <input type="text" id="msgInput" placeholder="Написать сообщение...">
        <button onclick="sendMessage()">ОТПРАВИТЬ</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://asik-app-32e5b-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Короткий звук сообщения
    const msgSound = new Audio('https://raw.githubusercontent.com/the-muda-organization/icq-sounds/master/message.wav');

    let currentTarget = null;
    let myUin = localStorage.getItem('asik_saved_uin');
    let contacts = JSON.parse(localStorage.getItem('asik_contacts') || '["777"]');

    // Если номера нет в памяти — спрашиваем один раз
    function checkLogin() {
        if (!myUin) {
            let u = prompt("Добро пожаловать в ASIK!\nВведите ваш личный номер (UIN):");
            if (u && u.trim() !== "") {
                myUin = u.trim();
                localStorage.setItem('asik_saved_uin', myUin);
            } else {
                checkLogin(); // Переспрашиваем, если пусто
            }
        }
        document.getElementById('my-uin-display').innerText = myUin;
        renderContacts();
    }

    function logout() {
        localStorage.removeItem('asik_saved_uin');
        location.reload();
    }

    function renderContacts() {
        const list = document.getElementById('contact-list');
        list.innerHTML = "";
        contacts.forEach(uin => {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.innerHTML = `<img src="https://img.icons8.com/color/20/flower.png" class="flower"> <b>${uin}</b>`;
            div.onclick = () => openChat(uin);
            list.appendChild(div);
        });
    }

    function addContact() {
        const uin = prompt("Введите номер друга:");
        if (uin && uin.trim() !== "" && !contacts.includes(uin)) {
            contacts.push(uin.trim());
            localStorage.setItem('asik_contacts', JSON.stringify(contacts));
            renderContacts();
        }
    }

    function openChat(uin) {
        currentTarget = uin;
        document.getElementById('main-window').style.display = 'none';
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('target-label').innerText = uin;
        
        const chatId = [myUin, uin].sort().join("_");
        const msgBox = document.getElementById('messages');
        msgBox.innerHTML = "";
        
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("child_added", (snap) => {
            const data = snap.val();
            const isMe = data.from == myUin;
            const style = isMe ? "text-align:right; color:#000080;" : "text-align:left; color:#006400;";
            msgBox.innerHTML += `<div style="${style} margin-bottom:8px;"><b>${data.from}:</b><br>${data.text}</div>`;
            msgBox.scrollTop = msgBox.scrollHeight;
            
            // Звук только на входящие сообщения
            if (!isMe) {
                msgSound.play().catch(()=>{});
            }
        });
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (text && currentTarget) {
            const chatId = [myUin, currentTarget].sort().join("_");
            db.ref("private_chats/" + chatId).push().set({ from: myUin, text: text });
            input.value = "";
        }
    }

    function showContacts() {
        document.getElementById('main-window').style.display = 'flex';
        document.getElementById('chat-window').style.display = 'none';
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // Запуск проверки при загрузке
    checkLogin();
</script>
</body>
</html>
