<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Final</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --primary: #00a884; --bg: #0b141a; --side: #111b21; --msg-me: #005c4b; --msg-them: #202c33; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* Экран входа */
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { background: var(--side); padding: 30px; border-radius: 20px; width: 280px; text-align: center; border: 1px solid #2a3942; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        /* Интерфейс чата */
        #main-app { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 300px; background: var(--side); border-right: 1px solid #2a3942; display: flex; flex-direction: column; }
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .me { align-self: flex-end; background: var(--msg-me); }
        .them { align-self: flex-start; background: var(--msg-them); }
        .input-box { padding: 15px; background: var(--side); display: flex; gap: 10px; }
        .contact { padding: 15px; border-bottom: 1px solid #2a3942; cursor: pointer; }
        .contact:hover { background: #2a3942; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--primary)">ASIK ∞</h1>
        <input type="text" id="auth-uin" placeholder="Ваш UIN">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
        <div id="auth-error" style="color:red; margin-top:10px; font-size:12px;"></div>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <div style="padding:15px; background:#000; display:flex; justify-content:space-between; align-items:center;">
            <b id="my-name">ASIK</b>
            <button onclick="addFriend()" style="background:none; border:none; color:var(--primary); font-size:20px; cursor:pointer;">+</button>
        </div>
        <div id="contact-list"></div>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:auto; color:red; border:none; background:none; padding:20px; cursor:pointer;">Выйти</button>
    </div>
    <div class="chat-area">
        <div id="chat-header" style="padding:15px; background:var(--side); border-bottom:1px solid #2a3942;">Выберите чат</div>
        <div id="messages"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Сообщение..." style="margin:0;">
            <button class="btn" onclick="sendMessage()" style="width:60px; margin:0;">➤</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const proxyUrl = "https://dry-unit-8e71.dimitriykor321.workers.dev/";
    firebase.initializeApp({ databaseURL: proxyUrl });
    const db = firebase.database();

    let myUin = localStorage.getItem('asik_uin');
    let activeChat = null;

    // СРАЗУ ПРИ ЗАГРУЗКЕ
    if(myUin) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('my-name').innerText = "UIN: " + myUin;
        loadContacts();
    }

    async function handleAuth() {
        const uin = document.getElementById('auth-uin').value.trim();
        const pass = btoa(document.getElementById('auth-pass').value.trim());
        const err = document.getElementById('auth-error');
        if(!uin) return;

        try {
            const res = await fetch(`${proxyUrl}users_auth/${uin}.json`);
            const data = await res.json();
            if(data && data.pass === pass) {
                localStorage.setItem('asik_uin', uin);
                location.reload();
            } else if(!data) {
                if(confirm("Создать UIN " + uin + "?")) {
                    await db.ref('users_auth/' + uin).set({ pass });
                    localStorage.setItem('asik_uin', uin);
                    location.reload();
                }
            } else { err.innerText = "Неверный пароль!"; }
        } catch(e) { err.innerText = "Ошибка связи."; }
    }

    function loadContacts() {
        db.ref(`user_contacts/${myUin}`).on('value', snap => {
            const list = document.getElementById('contact-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const d = document.createElement('div');
                d.className = 'contact';
                d.innerText = child.val();
                d.onclick = () => openChat(child.key, child.val());
                list.appendChild(d);
            });
        });
    }

    function openChat(uin, name) {
        activeChat = uin;
        document.getElementById('chat-header').innerText = name;
        const chatId = [myUin, uin].sort().join("_");
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("value", snap => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                div.className = "msg " + (m.from == myUin ? "me" : "them");
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMessage() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim() || !activeChat) return;
        const chatId = [myUin, activeChat].sort().join("_");
        db.ref("private_chats/" + chatId).push().set({ from: myUin, text: inp.value.trim() });
        inp.value = "";
    }

    function addFriend() {
        const uin = prompt("UIN друга:");
        const name = prompt("Имя:");
        if(uin && name) db.ref(`user_contacts/${myUin}/${uin}`).set(name);
    }

    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
