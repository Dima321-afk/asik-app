<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Light</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --p: #00a884; --bg: #0b141a; --s: #111b21; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; position: fixed; inset: 0; background: var(--bg); z-index: 100; }
        .card { background: var(--s); padding: 30px; border-radius: 20px; width: 260px; text-align: center; border: 1px solid #2a3942; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--p); color: white; font-weight: bold; cursor: pointer; }

        #app { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 300px; background: var(--s); border-right: 1px solid #2a3942; display: flex; flex-direction: column; }
        .chat { flex-grow: 1; display: flex; flex-direction: column; }
        #msgs { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 10px; border-radius: 10px; max-width: 70%; }
        .me { align-self: flex-end; background: #005c4b; }
        .them { align-self: flex-start; background: #202c33; }
        .item { padding: 15px; border-bottom: 1px solid #2a3942; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card">
        <h1 style="color:var(--p)">ASIK ∞</h1>
        <input type="text" id="u" placeholder="UIN">
        <input type="password" id="p" placeholder="Пароль">
        <button class="btn" onclick="auth()">ВОЙТИ</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; background:#182229;">
            <b id="myU">ASIK</b>
            <button onclick="add()" style="background:none; border:none; color:var(--p); font-size:30px; cursor:pointer;">+</button>
        </div>
        <div id="list"></div>
        <button onclick="localStorage.clear(); location.reload();" style="padding:10px; color:gray; border:none; background:none; cursor:pointer;">Выход</button>
    </div>
    <div class="chat">
        <div id="h" style="padding:15px; background:var(--s); border-bottom:1px solid #2a3942;">Чат не выбран</div>
        <div id="msgs"></div>
        <div style="padding:15px; background:var(--s); display:flex; gap:10px;">
            <input type="text" id="msg" placeholder="Сообщение..." style="margin:0;">
            <button class="btn" onclick="send()" style="width:60px;">➤</button>
        </div>
    </div>
</div>

<script>
    const url = "https://dry-unit-8e71.dimitriykor321.workers.dev/";
    let my = localStorage.getItem('asik_uin');
    let active = null;

    if(my) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('myU').innerText = "Я: " + my;
        load();
        setInterval(refresh, 3000); // Авто-обновление чата каждые 3 сек
    }

    async function auth() {
        const uin = document.getElementById('u').value.trim();
        const pass = btoa(document.getElementById('p').value.trim());
        if(!uin) return;
        try {
            const r = await fetch(`${url}users_auth/${uin}.json`);
            const d = await r.json();
            if(d && d.pass === pass) { go(uin); }
            else if(!d) {
                await fetch(`${url}users_auth/${uin}.json`, { method: 'PUT', body: JSON.stringify({pass}) });
                go(uin);
            } else { alert("Пароль!"); }
        } catch(e) { alert("Ошибка связи!"); }
    }

    function go(uin) { localStorage.setItem('asik_uin', uin); location.reload(); }

    async function load() {
        try {
            const r = await fetch(`${url}user_contacts/${my}.json`);
            const d = await r.json();
            const l = document.getElementById('list');
            l.innerHTML = "";
            if(d) Object.keys(d).forEach(k => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = d[k];
                div.onclick = () => { active = k; document.getElementById('h').innerText = d[k]; refresh(); };
                l.appendChild(div);
            });
        } catch(e) {}
    }

    async function add() {
        const uin = prompt("UIN друга:");
        const name = prompt("Имя:");
        if(uin && name) {
            await fetch(`${url}user_contacts/${my}/${uin}.json`, { method: 'PUT', body: JSON.stringify(name) });
            load();
        }
    }

    async function send() {
        const i = document.getElementById('msg');
        if(!i.value.trim() || !active) return;
        const id = [my, active].sort().join("_");
        await fetch(`${url}private_chats/${id}.json`, { 
            method: 'POST', 
            body: JSON.stringify({ from: my, text: i.value.trim() }) 
        });
        i.value = "";
        refresh();
    }

    async function refresh() {
        if(!active) return;
        const id = [my, active].sort().join("_");
        const r = await fetch(`${url}private_chats/${id}.json`);
        const d = await r.json();
        const b = document.getElementById('msgs');
        b.innerHTML = "";
        if(d) Object.values(d).forEach(m => {
            const div = document.createElement('div');
            div.className = "m " + (m.from == my ? "me" : "them");
            div.innerText = m.text;
            b.appendChild(div);
        });
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
