<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK - Infinity v4 (Ultimate)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.08);
            --text: #e0e0e0;
        }

        body { 
            background: var(--bg); font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: var(--text); overflow: hidden;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.2; }

        .app-shell { 
            width: 100%; max-width: 420px; height: 100vh; 
            background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(30px);
            display: flex; flex-direction: column; position: relative;
        }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header h1 { margin: 0; font-size: 1.5rem; font-weight: 200; letter-spacing: 4px; color: var(--accent); }

        #contact-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .contact-card { 
            background: var(--glass); margin-bottom: 10px; padding: 16px; 
            border-radius: 20px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .contact-card:active { transform: scale(0.97); background: rgba(255,255,255,0.15); }
        
        .status-orb { width: 10px; height: 10px; border-radius: 50%; background: #333; }
        .status-orb.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        #chat-window { display: none; flex-direction: column; height: 100%; position: absolute; top: 0; width: 100%; background: var(--bg); z-index: 10; }
        .chat-header { padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--glass); }
        
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; position: relative; }
        .msg.me { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.them { background: var(--glass); color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .msg img { 
            max-width: 100%; display: block; border-radius: 12px; 
            margin-top: 8px; border: 1px solid rgba(255,255,255,0.1);
        }

        .input-bar { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.3); }
        input[type="text"] { 
            flex-grow: 1; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 18px; border-radius: 25px; color: white; outline: none;
        }

        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--accent); color: #000; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
        .btn-attach { background: var(--glass); color: white; }

        /* Контекстное меню */
        .context-menu { position: fixed; background: #222; border: 1px solid var(--accent); border-radius: 12px; z-index: 100; display: none; padding: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .context-menu button { display: block; width: 100%; padding: 10px 20px; background: none; border: none; color: white; text-align: left; cursor: pointer; border-radius: 8px; }
        .context-menu button:hover { background: var(--glass); color: var(--accent); }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="context-menu" id="cMenu">
    <button onclick="editCurrentContact()">✏️ Изменить имя</button>
    <button onclick="deleteCurrentContact()" style="color: #ff4757;">🗑️ Удалить</button>
</div>

<div class="app-shell" id="main-window">
    <div class="header">
        <h1>ASIK<span>∞</span></h1>
        <button class="btn" onclick="addContact()">+</button>
    </div>
    <div id="contact-list"></div>
</div>

<div class="app-shell" id="chat-window">
    <div class="chat-header">
        <button onclick="showContacts()" style="background:none; border:none; color:var(--accent); font-size:1.8rem; cursor:pointer;">←</button>
        <div id="target-label" style="font-weight:200;">Чат</div>
    </div>
    <div id="messages"></div>
    <div class="input-bar">
        <button class="btn btn-attach" onclick="sendMedia()">📎</button>
        <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://asik-app-32e5b-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    let myUin = localStorage.getItem('asik_saved_uin');
    let currentTarget = null;
    let contactData = JSON.parse(localStorage.getItem('asik_contact_data') || '{"000": "✨ Заметки"}');
    let menuTarget = null;

    function checkLogin() {
        if (!myUin) {
            let u = prompt("Ваш UIN:");
            if (u && u.trim()) {
                myUin = u.trim();
                localStorage.setItem('asik_saved_uin', myUin);
            } else { location.reload(); }
        }
        db.ref('status/' + myUin).set(true);
        db.ref('status/' + myUin).onDisconnect().remove();
        renderContacts();
        startGlobalListener();
    }

    function renderContacts() {
        const list = document.getElementById('contact-list');
        list.innerHTML = "";
        Object.keys(contactData).forEach(uin => {
            const card = document.createElement('div');
            card.className = 'contact-card';
            card.innerHTML = `<div class="status-orb ${uin==='000'?'online':''}" id="orb-${uin}"></div>
                              <div><div style="font-weight:400;">${contactData[uin]}</div><div style="font-size:0.7rem; opacity:0.4">ID: ${uin}</div></div>`;
            
            card.onclick = () => openChat(uin, contactData[uin]);
            
            // ДЛЯ УДАЛЕНИЯ/ОБНОВЛЕНИЯ (Долгое нажатие)
            let pressTimer;
            card.onmousedown = (e) => { pressTimer = setTimeout(() => showMenu(e, uin), 600); };
            card.onmouseup = () => clearTimeout(pressTimer);
            card.ontouchstart = (e) => { pressTimer = setTimeout(() => showMenu(e.touches[0], uin), 600); };
            card.ontouchend = () => clearTimeout(pressTimer);
            
            list.appendChild(card);
        });
    }

    function showMenu(e, uin) {
        if (uin === '000') return; // Заметки нельзя удалять
        menuTarget = uin;
        const menu = document.getElementById('cMenu');
        menu.style.display = 'block';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
    }

    window.onclick = () => document.getElementById('cMenu').style.display = 'none';

    function deleteCurrentContact() {
        if(confirm(`Удалить контакт ${contactData[menuTarget]}?`)) {
            delete contactData[menuTarget];
            localStorage.setItem('asik_contact_data', JSON.stringify(contactData));
            renderContacts();
        }
    }

    function editCurrentContact() {
        const newName = prompt("Новое имя для " + menuTarget, contactData[menuTarget]);
        if(newName) {
            contactData[menuTarget] = newName;
            localStorage.setItem('asik_contact_data', JSON.stringify(contactData));
            renderContacts();
        }
    }

    function startGlobalListener() {
        Object.keys(contactData).forEach(uin => {
            if(uin === '000') return;
            db.ref('status/' + uin).on('value', snap => {
                const orb = document.getElementById('orb-' + uin);
                if (orb) orb.classList.toggle('online', !!snap.val());
            });
            const chatId = [myUin, uin].sort().join("_");
            db.ref("private_chats/" + chatId).limitToLast(1).on("child_added", snap => {
                if (snap.val().from !== myUin && currentTarget !== uin) alertSound.play().catch(()=>{});
            });
        });
    }

    function openChat(uin, name) {
        currentTarget = uin;
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('target-label').innerText = name;
        const chatId = uin === '000' ? "notes_" + myUin : [myUin, uin].sort().join("_");
        
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("value", snap => {
            const msgBox = document.getElementById('messages');
            msgBox.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                const isMe = data.from == myUin;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                
                // УЛУЧШЕННЫЙ ДЕТЕКТОР КАРТИНКИ
                let textContent = data.text;
                const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i;
                const hasImg = textContent.match(imgRegex);
                
                if (hasImg) {
                    div.innerHTML = `<div>${textContent.replace(hasImg[0], '')}</div><img src="${hasImg[0]}" onload="this.parentElement.parentElement.scrollTop = 9999999">`;
                } else {
                    div.innerText = textContent;
                }
                
                msgBox.appendChild(div);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        });
        document.getElementById('msgInput').focus();
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if (input.value.trim() && currentTarget) {
            const chatId = currentTarget === '000' ? "notes_" + myUin : [myUin, currentTarget].sort().join("_");
            db.ref("private_chats/" + chatId).push().set({ from: myUin, text: input.value.trim(), time: Date.now() });
            input.value = "";
        }
    }

    function sendMedia() {
        const url = prompt("Вставьте ссылку на фото:");
        if (url) { document.getElementById('msgInput').value = url; sendMessage(); }
    }

    function addContact() {
        const uin = prompt("UIN друга:");
        const name = prompt("Имя:");
        if (uin && name) {
            contactData[uin.trim()] = name;
            localStorage.setItem('asik_contact_data', JSON.stringify(contactData));
            renderContacts();
        }
    }

    function showContacts() { currentTarget = null; document.getElementById('chat-window').style.display = 'none'; }

    // Фон
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let dots = [];
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();
    for(let i=0; i<30; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.4, vy: Math.random()-0.4});
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#00f2ff';
        dots.forEach(d => {
            d.x += d.vx; d.y += d.vy;
            if(d.x<0 || d.x>canvas.width) d.vx*=-1; if(d.y<0 || d.y>canvas.height) d.vy*=-1;
            ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(anim);
    }
    anim();

    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    checkLogin();
</script>
</body>
</html>
