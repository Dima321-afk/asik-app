<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Final Force</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --primary: #00a884; --bg: #0b141a; --side: #111b21; --msg-me: #005c4b; --msg-them: #202c33; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; position: fixed; inset: 0; z-index: 100; background: var(--bg); }
        .auth-card { background: var(--side); padding: 30px; border-radius: 20px; width: 280px; text-align: center; border: 1px solid #2a3942; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        #main-app { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 300px; background: var(--side); border-right: 1px solid #2a3942; display: flex; flex-direction: column; }
        .side-header { padding: 15px; background: #182229; display: flex; justify-content: space-between; align-items: center; }
        
        #contact-list { flex-grow: 1; overflow-y: auto; }
        .contact { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .contact:hover { background: #2a3942; }

        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        #chat-header { padding: 15px; background: var(--side); border-bottom: 1px solid #2a3942; font-weight: bold; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 70%; word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--msg-me); }
        .them { align-self: flex-start; background: var(--msg-them); }

        .input-box { padding: 15px; background: var(--side); display: flex; gap: 10px; }
        .send-btn { background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--primary)">ASIK ∞</h1>
        <input type="text" id="auth-uin" placeholder="Ваш UIN">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
        <div id="auth-error" style="color:red; margin-top:10px; font-size:12px;"></div>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <div class="side-header">
            <b id="display-uin">ASIK</b>
            <button onclick="addFriend()" style="background:none; border:none; color:var(--primary); font-size:30px; cursor:pointer;">+</button>
        </div>
        <div id="contact-list"></div>
        <button onclick="localStorage.clear(); location.reload();" style="padding:15px; color:gray; border:none; background:none; cursor:pointer;">Выйти</button>
    </div>
    <div class="chat-area">
        <div id="chat-header">Выберите контакт</div>
        <div id="messages"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const proxyUrl = "https://dry-unit-8e71.dimitriykor321.workers.dev/";
    firebase.initializeApp({ databaseURL: proxyUrl });
    const db = firebase.database();

    let myUin = localStorage.getItem('asik_uin');
    let activeChat = null;

    if(myUin) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('display-uin').innerText = "UIN: " + myUin;
        loadContacts();
    }

    async function handleAuth() {
        const uin = document.getElementById('auth-uin').value.trim();
        const pass = btoa(document.getElementById('auth-pass').value.trim());
        if(!uin) return;
        try {
            const res = await fetch(`${proxyUrl}users_auth/${uin}.json`);
            const data = await res.json();
            if(data && data.pass === pass) {
                localStorage.setItem('asik_uin', uin);
                location.reload();
            } else if(!data) {
                await fetch(`${proxyUrl}users_auth/${uin}.json`, { method: 'PUT', body: JSON.stringify({ pass }) });
                localStorage.setItem('asik_uin', uin);
                location.reload();
            }
        } catch(e) { alert("Ошибка входа!"); }
    }

    function loadContacts() {
        db.ref(`user_contacts/${myUin}`).on('value', snap => {
            const list = document.getElementById('contact-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const uin = child.key; const name = child.val();
                const d = document.createElement('div');
                d.className = 'contact';
                d.innerHTML = `<b>${name}</b><br><small>UIN: ${uin}</small>`;
                d.onclick = () => openChat(uin, name);
                list.appendChild(d);
            });
        });
    }

    async function addFriend() {
        const uin = prompt("UIN друга:");
        const name = prompt("Имя:");
        if(uin && name) {
            // Силовой метод записи напрямую через fetch
            const res = await fetch(`${proxyUrl}user_contacts/${myUin}/${uin}.json`, {
                method: 'PUT',
                body: JSON.stringify(name)
            });
            if(res.ok) { alert("Добавлено!"); } else { alert("Ошибка воркера!"); }
        }
    }

    function openChat(uin, name) {
        activeChat = uin;
        document.getElementById('chat-header').innerText = "Чат с: " + name;
        const chatId = [myUin, uin].sort().join("_");
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("value", snap => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                div.className = "msg " + (m.from == myUin ? "me" : "them");
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function sendMessage() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim() || !activeChat) return;
        const chatId = [myUin, activeChat].sort().join("_");
        
        // Силовой метод отправки сообщения напрямую
        await fetch(`${proxyUrl}private_chats/${chatId}.json`, {
            method: 'POST',
            body: JSON.stringify({ from: myUin, text: inp.value.trim(), time: Date.now() })
        });
        inp.value = "";
    }

    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
