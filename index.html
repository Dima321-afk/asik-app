<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Ultimate Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --primary: #00a884; --bg: #0b141a; --side: #111b21; --msg-me: #005c4b; --msg-them: #202c33; --accent: #00f2ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; position: fixed; inset: 0; z-index: 100; background: var(--bg); }
        .auth-card { background: var(--side); padding: 30px; border-radius: 20px; width: 280px; text-align: center; border: 1px solid #2a3942; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }

        #main-app { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid #2a3942; display: flex; flex-direction: column; }
        .side-header { padding: 15px; background: #182229; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a3942; }
        
        #contact-list { flex-grow: 1; overflow-y: auto; }
        .contact { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .contact:hover { background: #2a3942; }
        .avatar-mini { width: 35px; height: 35px; background: #3d4a52; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .chat-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #chat-header { padding: 15px; background: var(--side); border-bottom: 1px solid #2a3942; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-color: #0d1418; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 75%; font-size: 15px; line-height: 1.4; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .me { align-self: flex-end; background: var(--msg-me); border-bottom-right-radius: 2px; }
        .them { align-self: flex-start; background: var(--msg-them); border-bottom-left-radius: 2px; }

        .input-box { padding: 12px 15px; background: var(--side); display: flex; gap: 10px; align-items: center; }
        #msgInput { margin: 0; border-radius: 25px; background: #2a3942; border: none; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--primary); margin-top:0;">ASIK ∞</h1>
        <input type="text" id="auth-uin" placeholder="Ваш UIN">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">ВОЙТИ / СОЗДАТЬ</button>
        <div id="auth-error" style="color:#ff4b4b; margin-top:10px; font-size:12px; min-height:15px;"></div>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <div class="side-header">
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="avatar-mini" id="my-avatar" style="background:var(--primary)">?</div>
                <b id="display-my-uin">ASIK</b>
            </div>
            <button onclick="addFriend()" style="background:none; border:none; color:var(--primary); font-size:28px; cursor:pointer; line-height:1;">+</button>
        </div>
        <div id="contact-list"></div>
        <button onclick="logout()" style="padding:15px; color:gray; border:none; background:none; cursor:pointer; text-align:left; font-size:12px;">Выйти из аккаунта</button>
    </div>
    <div class="chat-area">
        <div id="chat-header">Выберите контакт для общения</div>
        <div id="messages"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Введите сообщение..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const proxyUrl = "https://dry-unit-8e71.dimitriykor321.workers.dev/";
    firebase.initializeApp({ databaseURL: proxyUrl });
    const db = firebase.database();

    let myUin = localStorage.getItem('asik_uin');
    let activeChat = null;

    if(myUin) {
        showApp();
    }

    function showApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('display-my-uin').innerText = "UIN: " + myUin;
        document.getElementById('my-avatar').innerText = myUin[0].toUpperCase();
        loadContacts();
    }

    async function handleAuth() {
        const uin = document.getElementById('auth-uin').value.trim();
        const passRaw = document.getElementById('auth-pass').value.trim();
        const err = document.getElementById('auth-error');
        if(!uin || passRaw.length < 4) { err.innerText = "UIN и пароль (4+)!"; return; }
        
        const pass = btoa(passRaw);
        err.style.color = "var(--accent)";
        err.innerText = "Подключение...";

        try {
            const res = await fetch(`${proxyUrl}users_auth/${uin}.json`);
            const data = await res.json();
            
            if(data && data.pass === pass) {
                localStorage.setItem('asik_uin', uin);
                location.reload();
            } else if(!data) {
                if(confirm("Создать аккаунт " + uin + "?")) {
                    await db.ref('users_auth/' + uin).set({ pass: pass });
                    localStorage.setItem('asik_uin', uin);
                    location.reload();
                }
            } else {
                err.style.color = "#ff4b4b";
                err.innerText = "Неверный пароль!";
            }
        } catch(e) { err.innerText = "Сбой моста Cloudflare!"; }
    }

    function loadContacts() {
        // Слушаем список контактов
        db.ref(`user_contacts/${myUin}`).on('value', snap => {
            const list = document.getElementById('contact-list');
            list.innerHTML = "";
            if(!snap.exists()) {
                list.innerHTML = "<div style='padding:20px; color:gray; font-size:13px; text-align:center;'>Нажмите +, чтобы добавить друга</div>";
                return;
            }
            snap.forEach(child => {
                const uin = child.key;
                const name = child.val();
                const d = document.createElement('div');
                d.className = 'contact';
                d.innerHTML = `<div class="avatar-mini">${name[0].toUpperCase()}</div><div><b>${name}</b><br><small style="color:gray">UIN: ${uin}</small></div>`;
                d.onclick = () => openChat(uin, name);
                list.appendChild(d);
            });
        });
    }

    function openChat(uin, name) {
        activeChat = uin;
        document.getElementById('chat-header').innerHTML = `<div class="avatar-mini">${name[0].toUpperCase()}</div> ${name}`;
        const chatId = [myUin, uin].sort().join("_");
        
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("value", snap => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                div.className = "msg " + (m.from == myUin ? "me" : "them");
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMessage() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim() || !activeChat) return;
        const chatId = [myUin, activeChat].sort().join("_");
        db.ref("private_chats/" + chatId).push().set({
            from: myUin,
            text: inp.value.trim(),
            time: Date.now()
        });
        inp.value = "";
    }

    async function addFriend() {
        const uin = prompt("Введите UIN друга:");
        const name = prompt("Введите имя (как подписать):");
        if(uin && name) {
            // Записываем в ветку контактов
            await db.ref(`user_contacts/${myUin}/${uin}`).set(name);
            alert("Контакт добавлен!");
        }
    }

    function logout() { localStorage.clear(); location.reload(); }
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
