<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK - Infinity Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/100/fantasy.png">
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.2);
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        body { 
            background: var(--bg); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: var(--text);
            overflow: hidden;
        }

        /* Живой фон */
        #bg-canvas { position: absolute; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.4; }

        .app-shell { 
            width: 100%; max-width: 420px; height: 95vh; 
            background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden; position: relative;
        }

        .header { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
        }
        .header h1 { margin: 0; font-size: 1.4rem; font-weight: 200; letter-spacing: 3px; color: var(--accent); }

        /* Контакты */
        #contact-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .contact-card { 
            background: var(--glass); margin-bottom: 12px; padding: 16px; 
            border-radius: 16px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; border: 1px solid transparent; transition: 0.3s;
        }
        .contact-card:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-dim); }
        
        .status-orb { 
            width: 10px; height: 10px; border-radius: 50%; background: #333; 
            transition: 0.5s; position: relative;
        }
        .status-orb.online { 
            background: var(--accent); 
            box-shadow: 0 0 15px var(--accent);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Чат */
        #chat-window { display: none; flex-direction: column; height: 100%; position: absolute; top: 0; width: 100%; background: var(--bg); z-index: 10; }
        .chat-header { padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--glass); }
        
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { 
            max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem;
            animation: slideUp 0.3s ease-out; position: relative;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.me { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.them { background: var(--glass); color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Поле ввода */
        .input-bar { 
            padding: 20px; display: flex; gap: 10px; align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
        }
        input[type="text"] { 
            flex-grow: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px 20px; border-radius: 30px; color: white; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .btn { 
            width: 50px; height: 50px; border-radius: 50%; border: none; 
            background: var(--accent); color: #000; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.9); }
        .btn-attach { background: var(--glass); color: white; }

        .meta { font-size: 0.7rem; opacity: 0.4; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="app-shell" id="main-window">
    <div class="header">
        <h1>ASIK<span>∞</span></h1>
        <button class="btn" onclick="addContact()" style="width: 40px; height: 40px; border-radius: 12px;">+</button>
    </div>
    <div style="padding: 0 20px 10px; font-size: 0.8rem; color: var(--accent); opacity: 0.6;">
        ID: <span id="my-uin-display">...</span>
    </div>
    <div id="contact-list"></div>
</div>

<div class="app-shell" id="chat-window">
    <div class="chat-header">
        <button onclick="showContacts()" style="background:none; border:none; color:var(--accent); font-size:1.8rem;">←</button>
        <div id="target-label" style="font-weight:200; font-size: 1.2rem;">Чат</div>
    </div>
    <div id="messages"></div>
    <div class="input-bar">
        <button class="btn btn-attach" onclick="sendMedia()">+</button>
        <input type="text" id="msgInput" placeholder="Пиши..." autocomplete="off">
        <button class="btn" onclick="sendMessage()">→</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://asik-app-32e5b-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // НОВЫЙ ЗВУК: Мягкий водяной пузырек
    const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    let myUin = localStorage.getItem('asik_saved_uin');
    let currentTarget = null;
    let contactData = JSON.parse(localStorage.getItem('asik_contact_data') || '{"000": "✨ Избранное"}');

    function checkLogin() {
        if (!myUin) {
            let u = prompt("Твой UIN:");
            if (u && u.trim()) {
                myUin = u.trim();
                localStorage.setItem('asik_saved_uin', myUin);
            } else { location.reload(); }
        }
        document.getElementById('my-uin-display').innerText = myUin;
        db.ref('status/' + myUin).set(true);
        db.ref('status/' + myUin).onDisconnect().remove();
        renderContacts();
        startGlobalListener();
    }

    function renderContacts() {
        const list = document.getElementById('contact-list');
        list.innerHTML = "";
        Object.keys(contactData).forEach(uin => {
            const card = document.createElement('div');
            card.className = 'contact-card';
            card.innerHTML = `
                <div class="status-orb ${uin === '000' ? 'online' : ''}" id="orb-${uin}"></div>
                <div style="flex-grow:1">
                    <div style="font-weight:400; font-size: 1.1rem;">${contactData[uin]}</div>
                    <div style="font-size:0.7rem; opacity:0.4">ID: ${uin}</div>
                </div>
            `;
            card.onclick = () => openChat(uin, contactData[uin]);
            list.appendChild(card);
        });
    }

    function startGlobalListener() {
        Object.keys(contactData).forEach(uin => {
            if(uin === '000') return;
            db.ref('status/' + uin).on('value', snap => {
                const orb = document.getElementById('orb-' + uin);
                if (orb) orb.classList.toggle('online', !!snap.val());
            });

            const chatId = [myUin, uin].sort().join("_");
            db.ref("private_chats/" + chatId).limitToLast(1).on("child_added", snap => {
                const data = snap.val();
                if (data.from !== myUin && currentTarget !== uin) {
                    alertSound.play().catch(()=>{});
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification(contactData[uin], { body: data.text });
                    }
                }
            });
        });
    }

    function openChat(uin, name) {
        currentTarget = uin;
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('target-label').innerText = name;
        
        const msgBox = document.getElementById('messages');
        const chatId = uin === '000' ? "notes_" + myUin : [myUin, uin].sort().join("_");
        
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("value", snap => {
            msgBox.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                const isMe = data.from == myUin;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                
                let content = data.text;
                if (content.match(/\.(jpeg|jpg|gif|png)$/) || content.startsWith('http')) {
                    content = `<img src="${content}" style="max-width:100%; border-radius:10px; margin-bottom:5px;"><br>${content}`;
                }
                
                const time = new Date(data.time || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                div.innerHTML = `<div>${content}</div><span class="meta">${time}</span>`;
                msgBox.appendChild(div);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        });
        document.getElementById('msgInput').focus();
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if (input.value.trim() && currentTarget) {
            const chatId = currentTarget === '000' ? "notes_" + myUin : [myUin, currentTarget].sort().join("_");
            db.ref("private_chats/" + chatId).push().set({ 
                from: myUin, 
                text: input.value.trim(),
                time: Date.now()
            });
            input.value = "";
        }
    }

    function sendMedia() {
        const url = prompt("Линк на фото:");
        if (url) { document.getElementById('msgInput').value = url; sendMessage(); }
    }

    function addContact() {
        const uin = prompt("UIN друга:");
        const name = prompt("Имя:");
        if (uin && name) {
            contactData[uin.trim()] = name;
            localStorage.setItem('asik_contact_data', JSON.stringify(contactData));
            location.reload();
        }
    }

    function showContacts() {
        currentTarget = null;
        document.getElementById('chat-window').style.display = 'none';
    }

    // Фоновая анимация
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let dots = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    for(let i=0; i<40; i++) dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5 });
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#00f2ff';
        dots.forEach(d => {
            d.x += d.vx; d.y += d.vy;
            if(d.x<0 || d.x>canvas.width) d.vx *= -1;
            if(d.y<0 || d.y>canvas.height) d.vy *= -1;
            ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(anim);
    }
    anim();

    document.getElementById('msgInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    if (Notification.permission !== "granted") Notification.requestPermission();
    checkLogin();
</script>
</body>
</html>
