<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK Messenger</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://img.icons8.com/plasticine/100/bicycle.png">

    <style>
        body { 
            background-color: #008080; 
            font-family: 'Tahoma', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        .window { 
            width: 95%; 
            max-width: 320px; 
            background: #c0c0c0; 
            border: 2px solid #fff; 
            border-right: 2px solid #808080; 
            border-bottom: 2px solid #808080; 
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5); 
        }
        .title-bar { 
            background: linear-gradient(90deg, #000080, #1084d0); 
            color: white; 
            padding: 4px 6px; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 13px; 
        }
        .content { padding: 10px; }
        #chat { 
            height: 300px; 
            background: white; 
            border: 2px inset #fff; 
            overflow-y: auto; 
            margin-bottom: 10px; 
            padding: 8px; 
            font-size: 14px; 
            color: black; 
            text-align: left; 
        }
        .input-group { display: flex; gap: 5px; flex-direction: column; }
        input { 
            border: 2px inset #fff; 
            padding: 10px; 
            outline: none; 
            font-size: 16px; /* 16px предотвращает зум на iPhone */
        }
        button { 
            background: #c0c0c0; 
            border: 2px solid #fff; 
            border-right: 2px solid #808080; 
            border-bottom: 2px solid #808080; 
            padding: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        button:active { border: 2px inset #fff; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span><img src="https://img.icons8.com/plasticine/24/bicycle.png" style="vertical-align: middle; width: 18px; height: 18px;"> ASIK Messenger</span>
        <span>✕</span>
    </div>
    <div class="content">
        <div id="chat"></div>
        <div class="input-group">
            <input type="text" id="username" placeholder="Твой ник">
            <input type="text" id="msg" placeholder="Сообщение...">
            <button onclick="send()">ОТПРАВИТЬ</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        databaseURL: "https://asik-app-32e5b-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Звук пузырька (Pop)
    const bubbleSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    function playSound() {
        bubbleSound.currentTime = 0;
        bubbleSound.play().catch(function(e) {
            console.log("Ждем клика для звука");
        });
    }

    function send() {
        const user = document.getElementById('username').value || "Аноним";
        const msgInput = document.getElementById('msg');
        const text = msgInput.value;
        
        if (text.trim() !== "") {
            db.ref("messages").push().set({
                username: user,
                text: text
            });
            msgInput.value = "";
        }
    }

    db.ref("messages").on("child_added", (snapshot) => {
        const data = snapshot.val();
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div><b style="color:#000080;">${data.username}:</b> ${data.text}</div>`;
        chat.scrollTop = chat.scrollHeight;
        
        // Воспроизводим пузырек
        playSound();
    });

    document.getElementById('msg').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { send(); }
    });
</script>

</body>
</html>
