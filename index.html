<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: #111b21; padding: 40px; border-radius: 20px; width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2a3942; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #00a884; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #auth-error { color: #ff4b4b; font-size: 13px; margin-top: 10px; min-height: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:#00a884; margin-bottom: 20px;">ASIK ∞</h1>
        <input type="text" id="auth-uin" placeholder="Ваш UIN (номер)">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="handleAuth()">ВОЙТИ / СОЗДАТЬ</button>
        <div id="auth-error"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Ссылка на твой воркер Cloudflare (со слэшем!)
    const proxyUrl = "https://dry-unit-8e71.dimitriykor321.workers.dev/";

    // Инициализация базы
    try {
        firebase.initializeApp({ databaseURL: proxyUrl });
        var db = firebase.database();
    } catch(e) {
        document.getElementById('auth-error').innerText = "Ошибка загрузки Firebase!";
    }

    async function handleAuth() {
        const uin = document.getElementById('auth-uin').value.trim();
        const passRaw = document.getElementById('auth-pass').value.trim();
        const err = document.getElementById('auth-error');

        if(!uin || passRaw.length < 4) {
            err.innerText = "Введите UIN и пароль (4+)!";
            return;
        }

        const pass = btoa(passRaw);
        err.style.color = "#00a884";
        err.innerText = "Связь через Cloudflare...";

        try {
            const snap = await db.ref('users_auth/' + uin).once('value');
            const data = snap.val();

            if(data) {
                if(data.pass === pass) {
                    localStorage.setItem('asik_uin', uin);
                    alert("Успех! Перезагрузи страницу.");
                    location.reload();
                } else {
                    err.style.color = "#ff4b4b";
                    err.innerText = "Неверный пароль!";
                }
            } else {
                if(confirm("Создать новый аккаунт " + uin + "?")) {
                    await db.ref('users_auth/' + uin).set({ pass: pass });
                    localStorage.setItem('asik_uin', uin);
                    location.reload();
                }
            }
        } catch(e) {
            err.style.color = "#ff4b4b";
            err.innerText = "Мост не отвечает. Проверь Cloudflare!";
            console.error(e);
        }
    }

    // Если уже залогинены - просто покажем сообщение (пока без интерфейса чата для теста)
    if(localStorage.getItem('asik_uin')) {
        document.getElementById('auth-screen').innerHTML = `
            <div class="auth-card">
                <h2 style="color:#00a884">Вы в сети!</h2>
                <p>UIN: ${localStorage.getItem('asik_uin')}</p>
                <button onclick="localStorage.clear(); location.reload();" style="background:#ff4b4b">ВЫЙТИ</button>
            </div>`;
    }
</script>

</body>
</html>
