<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASIK - Ретро Мессенджер</title>
    <style>
        /* Стиль в духе Windows 98 */
        body { background-color: #008080; font-family: 'Tahoma', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .window { width: 320px; background: #c0c0c0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 3px 5px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .flower { width: 16px; height: 16px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; border: 1px solid #000; }
        .content { padding: 10px; }
        .chat-area { height: 200px; background: white; border: 2px inset #fff; overflow-y: auto; margin-bottom: 10px; padding: 5px; font-size: 13px; }
        .input-group { display: flex; gap: 5px; }
        input { border: 2px inset #fff; padding: 3px; flex-grow: 1; outline: none; }
        button { background: #c0c0c0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; padding: 3px 10px; cursor: pointer; font-size: 12px; }
        button:active { border: 2px inset #fff; }
        .status-bar { border-top: 1px solid #808080; padding: 2px 5px; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span><span class="flower"></span>ASIK - 444-555-001</span>
        <span>✕</span>
    </div>
    <div class="content">
        <div class="chat-area" id="chat">
            <div><b>Система:</b> Добро пожаловать в ASIK!</div>
            <div><b>Система:</b> Ожидание собеседника...</div>
        </div>
        <div class="input-group">
            <input type="text" id="msg" placeholder="Напиши что-нибудь...">
            <button onclick="send()">Send</button>
        </div>
    </div>
    <div class="status-bar">Статус: В сети</div>
</div>

<script>
    // Простая имитация отправки
    function send() {
        const input = document.getElementById('msg');
        const chat = document.getElementById('chat');
        if (input.value.trim() !== "") {
            const msgDiv = document.createElement('div');
            msgDiv.innerHTML = `<b>Вы:</b> ${input.value}`;
            chat.appendChild(msgDiv);
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
            
            // Здесь будет звук "О-оу!" позже
        }
    }
</script>

</body>
</html>
