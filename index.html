<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK Messenger</title>
    <style>
        body { background-color: #008080; font-family: 'Tahoma', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .window { width: 320px; background: #c0c0c0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 3px 5px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .content { padding: 10px; }
        #chat { height: 250px; background: white; border: 2px inset #fff; overflow-y: auto; margin-bottom: 10px; padding: 5px; font-size: 13px; color: black; }
        .input-group { display: flex; gap: 5px; flex-direction: column; }
        input { border: 2px inset #fff; padding: 5px; outline: none; }
        button { background: #c0c0c0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; padding: 5px; cursor: pointer; font-weight: bold; }
        button:active { border: 2px inset #fff; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span><img src="https://img.icons8.com/plasticine/24/bicycle.png" style="vertical-align: middle;"> ASIK Messenger</span>
        <span>✕</span>
    </div>
    <div class="content">
        <div id="chat"></div>
        <div class="input-group">
            <input type="text" id="username" placeholder="Твой ник">
            <input type="text" id="msg" placeholder="Сообщение...">
            <button onclick="send()">ОТПРАВИТЬ</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        databaseURL: "https://asik-app-32e5b-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Звук "O-oh!"
    const notificationSound = new Audio('https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptoken=df73347b-13f5-4762-881c-d78201a613d3');

    function playSound() {
        notificationSound.play().catch(e => console.log("Нужен клик по странице для активации звука"));
    }

    function send() {
        const user = document.getElementById('username').value || "Аноним";
        const msgInput = document.getElementById('msg');
        const text = msgInput.value;
        
        if (text.trim() !== "") {
            db.ref("messages").push().set({
                username: user,
                text: text
            });
            msgInput.value = "";
        }
    }

    // Слушаем сообщения
    db.ref("messages").on("child_added", (snapshot) => {
        const data = snapshot.val();
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div><b>${data.username}:</b> ${data.text}</div>`;
        chat.scrollTop = chat.scrollHeight;
        
        // Звук сработает, если ты хотя бы раз кликнул по окну
        playSound();
    });

    // Отправка по Enter
    document.getElementById('msg').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { send(); }
    });
</script>

</body>
</html>
