<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --primary: #00a884; --bg-dark: #0b141a; --bg-sidebar: #111b21; --danger: #ff4b4b; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg-dark); color: white; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-sidebar); padding: 30px; border-radius: 20px; width: 280px; text-align: center; border: 1px solid #2a3942; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        #auth-error { color: var(--danger); font-size: 12px; margin-top: 10px; word-break: break-all; }
        .app-container { display: flex; width: 100vw; height: 100vh; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--primary)">ASIK ∞</h1>
        <input type="text" id="auth-uin" class="auth-input" placeholder="Ваш UIN (номер)">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
        <button class="auth-btn" onclick="handleAuth()">ВОЙТИ / СОЗДАТЬ</button>
        <div id="auth-error"></div>
    </div>
</div>

<div class="app-container" id="main-app" style="display:none;">
    <div style="padding:20px;">
        <h2 style="color:var(--primary)">Вы в сети!</h2>
        <p id="my-info"></p>
        <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:1px solid red; padding:10px; cursor:pointer;">ВЫЙТИ</button>
        <hr>
        <p>Интерфейс чата загружается...</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // ПРОВЕРЬ ЭТУ ССЫЛКУ! Она должна быть ровно такая, как в Cloudflare
    const proxyUrl = "https://dry-unit-8e71.dimitriykor321.workers.dev/";

    let myUin = localStorage.getItem('asik_uin');
    
    // Если уже залогинены
    if(myUin) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('my-info').innerText = "Ваш UIN: " + myUin;
    }

    async function handleAuth() {
        const uin = document.getElementById('auth-uin').value.trim();
        const passRaw = document.getElementById('auth-pass').value.trim();
        const err = document.getElementById('auth-error');

        if(!uin || passRaw.length < 4) {
            err.innerText = "Введите UIN и пароль (мин. 4 символа)!";
            return;
        }

        const pass = btoa(passRaw);
        err.style.color = "#00f2ff";
        err.innerText = "Проверка связи...";

        try {
            // Прямой запрос к воркеру
            const response = await fetch(`${proxyUrl}users_auth/${uin}.json`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });

            if (!response.ok) {
                throw new Error("Воркер ответил ошибкой: " + response.status);
            }

            const data = await response.json();

            if (data) {
                if (data.pass === pass) {
                    localStorage.setItem('asik_uin', uin);
                    location.reload();
                } else {
                    err.style.color = "var(--danger)";
                    err.innerText = "Неверный пароль!";
                }
            } else {
                // Если пользователя нет — создаем
                if (confirm("UIN не найден. Создать новый?")) {
                    const regResponse = await fetch(`${proxyUrl}users_auth/${uin}.json`, {
                        method: 'PUT',
                        body: JSON.stringify({ pass: pass })
                    });
                    if(regResponse.ok) {
                        localStorage.setItem('asik_uin', uin);
                        location.reload();
                    } else {
                        err.innerText = "Ошибка регистрации через мост.";
                    }
                }
            }
        } catch (e) {
            err.style.color = "var(--danger)";
            err.innerText = "ОШИБКА: " + e.message + ". Проверь 'Deploy' в Cloudflare!";
            console.error(e);
        }
    }
</script>
</body>
</html>
