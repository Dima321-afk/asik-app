<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASIK ∞ Voice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <style>
        /* Все предыдущие стили сохраняются, добавляем новые для голоса */
        :root {
            --primary: #00a884;
            --bg-dark: #0b141a;
            --bg-sidebar: #111b21;
            --text-main: #e9edef;
            --my-msg: #005c4b;
            --their-msg: #202c33;
            --record-active: #ff4757;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        .app-container { display: flex; width: 100vw; height: 100vh; }
        .sidebar { width: 100%; max-width: 400px; background: var(--bg-sidebar); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .contact-item { padding: 12px 16px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .chat-view { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-dark); position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: translateX(100%); transition: 0.3s; z-index: 10; }
        .chat-view.active { transform: translateX(0); }
        .chat-header { padding: 10px 16px; background: var(--bg-sidebar); display: flex; align-items: center; gap: 12px; }
        
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        
        .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 0.95rem; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); word-wrap: break-word; }
        .msg-bubble.me { align-self: flex-end; background: var(--my-msg); }
        .msg-bubble.them { align-self: flex-start; background: var(--their-msg); }

        .input-area { padding: 10px 15px; background: var(--bg-sidebar); display: flex; align-items: center; gap: 10px; }
        #msgInput { flex-grow: 1; border: none; padding: 12px 18px; border-radius: 25px; background: #2a3942; color: white; outline: none; }

        .btn { background: none; border: none; color: #8696a0; cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-record.active { color: var(--record-active); transform: scale(1.2); filter: drop-shadow(0 0 5px var(--record-active)); }
        
        audio { height: 35px; max-width: 220px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); margin-top: 5px; }
        .msg-img { max-width: 100%; border-radius: 8px; margin-top: 5px; }

        @media (min-width: 768px) { .chat-view { position: relative; transform: translateX(0); } .sidebar { width: 350px; } .back-btn { display: none; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="header"><h3>ASIK ∞</h3><button class="btn" onclick="addContact()">👤+</button></div>
        <div id="contact-list"></div>
    </div>
    <div class="chat-view" id="chat-window">
        <div class="chat-header">
            <button class="btn back-btn" onclick="closeChat()">←</button>
            <div class="avatar" id="chat-avatar">?</div>
            <div id="chat-title" style="font-weight: 600;">Чат</div>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="file" id="fileInput" hidden accept="image/*">
            <button class="btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button class="btn btn-record" id="recordBtn" onclick="toggleRecord()">🎙️</button>
            <button class="btn" onclick="sendMessage()" style="color:var(--primary)">➤</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://asik-app-32e5b-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myUin = localStorage.getItem('asik_saved_uin') || prompt("Ваш UIN:");
    if (myUin) localStorage.setItem('asik_saved_uin', myUin); else location.reload();

    let currentTarget = null;
    let contacts = {};
    let mediaRecorder;
    let audioChunks = [];

    // Загрузка контактов
    db.ref('user_contacts/' + myUin).on('value', snap => {
        contacts = snap.val() || { "000": "✨ Заметки" };
        renderContacts();
    });

    function renderContacts() {
        const list = document.getElementById('contact-list'); list.innerHTML = "";
        Object.keys(contacts).forEach(uin => {
            const item = document.createElement('div');
            item.className = 'contact-item';
            item.innerHTML = `<div class="avatar">${contacts[uin][0]}</div><div><b>${contacts[uin]}</b><br><small>UIN: ${uin}</small></div>`;
            item.onclick = () => openChat(uin, contacts[uin]);
            list.appendChild(item);
        });
    }

    function openChat(uin, name) {
        currentTarget = uin;
        document.getElementById('chat-window').classList.add('active');
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-avatar').innerText = name[0];
        const chatId = uin === '000' ? `notes_${myUin}` : [myUin, uin].sort().join("_");
        const msgBox = document.getElementById('messages'); msgBox.innerHTML = "";
        db.ref("private_chats/" + chatId).off();
        db.ref("private_chats/" + chatId).on("child_added", snap => appendMessage(snap.val()));
    }

    function appendMessage(data) {
        const msgBox = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg-bubble ${data.from == myUin ? 'me' : 'them'}`;
        
        let html = `<div>${data.text || ''}</div>`;
        if (data.image) html += `<img src="${data.image}" class="msg-img">`;
        if (data.voice) html += `<audio controls src="${data.voice}"></audio>`;
        
        div.innerHTML = html;
        msgBox.appendChild(div);
        msgBox.scrollTop = msgBox.scrollHeight;
    }

    function sendMessage(extras = {}) {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if ((text || extras.image || extras.voice) && currentTarget) {
            const chatId = currentTarget === '000' ? `notes_${myUin}` : [myUin, currentTarget].sort().join("_");
            db.ref("private_chats/" + chatId).push().set({
                from: myUin, text: text, time: Date.now(), ...extras
            });
            input.value = "";
        }
    }

    // --- ЛОГИКА ГОЛОСОВЫХ ---
    async function toggleRecord() {
        const btn = document.getElementById('recordBtn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => sendMessage({ voice: reader.result });
                stream.getTracks().forEach(t => t.stop());
            };
            
            mediaRecorder.start();
            btn.classList.add('active');
        } else {
            mediaRecorder.stop();
            btn.classList.remove('active');
        }
    }

    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => sendMessage({ image: ev.target.result });
        reader.readAsDataURL(e.target.files[0]);
    };

    function addContact() {
        const uin = prompt("UIN:"); const name = prompt("Имя:");
        if (uin && name) db.ref(`user_contacts/${myUin}/${uin}`).set(name);
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('active'); }
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
